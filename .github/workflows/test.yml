name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Test (Python)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: ./backend
        run: pytest -v --tb=short

      - name: Run ruff linter
        working-directory: ./backend
        run: ruff check .

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package.json

      - name: Install dependencies (admin)
        working-directory: ./frontend/admin
        run: npm ci

      - name: Build admin
        working-directory: ./frontend/admin
        run: npm run build

      - name: Set up Node.js for website
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/website/package.json

      - name: Install dependencies (website)
        working-directory: ./frontend/website
        run: npm ci

      - name: Build website
        working-directory: ./frontend/website
        run: npm run build
